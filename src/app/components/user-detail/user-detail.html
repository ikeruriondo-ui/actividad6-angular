<div class="container" *ngIf="user as u">
  <div class="card shadow-sm">
    <div class="row g-0">
      <div class="col-md-4">
        <img
          [src]="u.image"
          class="img-fluid rounded-start w-100"
          [alt]="u.first_name"
        >
      </div>

      <div class="col-md-8">
        <div class="card-body">
          <h2 class="card-title">{{ u.first_name }} {{ u.last_name }}</h2>
          <p class="card-text"><strong>ID:</strong> {{ u.id }}</p>
          <p class="card-text"><strong>Email:</strong> {{ u.email }}</p>

          <div class="d-flex gap-2 mt-4">
            <a class="btn btn-secondary" routerLink="/home">Volver al listado</a>
            <a class="btn btn-warning" [routerLink]="['/updateuser', user._id]">Actualizar</a>
            <button class="btn btn-danger" (click)="onDelete()">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
